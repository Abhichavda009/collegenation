# Render Blueprint for the College Nation FastAPI backend.
# On render.com: New > Blueprint > connect this repo. Render reads this file,
# then prompts you for the DATABASE_URL value (your Neon connection string).
services:
  - type: web
    name: collegenation-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.1"
      - key: DATABASE_URL
        sync: false   # set this in the Render dashboard (your Neon URL)
